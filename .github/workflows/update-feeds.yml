name: Update Science and Technology Feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *" # Runs every day at 12:00 UTC

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Generate feed JSON
        run: npm run update-feeds
     
      - name: Commit updated feed files
        run: |
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
    
            git add \
            public/data/science.json \
            public/data/technology.json \
            lib/generatedResearchReports.ts
      
            git diff --cached --quiet || git commit -m "Auto update ArcheNova feeds and reports"

      - name: Push changes
        run: git push